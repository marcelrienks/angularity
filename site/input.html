<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angularity</title>
  <script>
    const theme = localStorage.getItem('angularity-theme');
    if (theme === 'light' || theme === 'dark') {
      document.documentElement.setAttribute('data-theme', theme);
    }
  </script>
  <link rel="stylesheet" href="css/shared.css">
</head>
<body>

  <nav class="navbar">
    <h1 class="title header">Angularity</h1>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="input.html">Input Sheet</a></li>
      <li><a href="report.html">Report</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <h1 class="header">Input Camber and/or Toe measurements</h2>
    <p id="input-subtitle" class="paragraph">Enter camber at 360° ACW, 0°, and 360° CW steering wheel positions</p>
  </header>

  <main class="grid-container">

    <div id="error-banner" class="error-banner" role="alert" style="display: none;">
      <span id="error-message"></span>
      <button class="sub-header" id="error-close">&times;</button>
    </div>
    <div id="warning-banner" class="warning-banner" role="status"></div>

        <!-- INPUT MEASUREMENT GRID
          PURPOSE: Capture camber readings at each bolt position combination (13×13 grid).
          Each cell receives three steering wheel measurements: 360° ACW, 0°, 360° CW (used to calculate caster).
         Auto-saves to browser localStorage on every cell change.
         ──────────────────────────────────────────────────────────────────────────────────────── -->
    <div class="grid-controls">
      <div class="wheel-selector" id="wheel-selector" role="tablist" aria-label="Wheel selection">
        <div class="selector-row">
          <button class="active sub-header" data-wheel="FL" role="tab" aria-selected="true">Front Left (FL)</button>
          <button class="sub-header" data-wheel="FR" role="tab" aria-selected="false">Front Right (FR)</button>
        </div>
        <div class="selector-row">
          <button class="sub-header" data-wheel="RL" role="tab" aria-selected="false">Rear Left (RL)</button>
          <button class="sub-header" data-wheel="RR" role="tab" aria-selected="false">Rear Right (RR)</button>
        </div>
      </div>

      <div class="control-buttons">
        <div class="buttons-row">
          <button class="button primary sub-header" id="btn-download">Save CSV</button>
          <label class="button sub-header" id="btn-load-label" for="csv-upload">Load CSV</label>
          <input type="file" id="csv-upload" accept=".csv" aria-label="Load CSV file" style="display:none">
        </div>
        <div class="buttons-row">
          <button class="button sub-header" id="btn-sample">Sample Data</button>
          <button class="button danger sub-header" id="btn-clear">Clear All</button>
        </div>
      </div>
    </div>


    <!-- 13×13 Grid injected here by input-grid.js -->
    <div class="grid-wrapper" id="grid-wrapper">
      <div class="input-grid" id="input-grid" role="grid" aria-label="Bolt position input matrix"></div>
    </div>

    <p class="form-note paragraph">
      Rows = Rear bolt (−6 to +6) &nbsp;·&nbsp;
      Columns = Front bolt (−6 to +6) &nbsp;·&nbsp;
      Required positions: −6, −3, 0, +3, +6 (highlighted border)
    </p>

  </main>

  <script type="module" src="../js/error-handler.js"></script>
  <script type="module" src="../js/input-grid.js"></script>
  <script type="module">
    import { updateMeasurementMethodText, getCurrentMeasurementMode, getCurrentDensity } from '../js/measurement-utils.js';
    document.addEventListener('DOMContentLoaded', () => {
      updateMeasurementMethodText(getCurrentMeasurementMode(), getCurrentDensity());
    });
  </script>

  <script type="module">
    // Set active nav link
    const links = document.querySelectorAll('.nav-links a');
    const current = location.pathname.split('/').pop() || 'index.html';
    links.forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === current);
    });
  </script>

  <script type="module" defer>
    import { initTheme, buildConfigMenu } from '../js/theme-manager.js';
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      document.querySelector('.nav-links').appendChild(buildConfigMenu());
    });
  </script>

</body>
</html>
